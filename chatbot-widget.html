<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Widget flottant */
        #chatbot-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(90deg, #094102, #ff5700);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 9999;
            font-size: 1.5rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            transition: all 0.3s ease;
            border: none;
        }

        #chatbot-widget:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }

        #chatbot-widget:active {
            transform: scale(0.95);
        }

        #chatbot-widget svg {
            pointer-events: none;
        }

        /* Conteneur du chatbot */
        #chatbot-container {
            display: none;
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 400px;
            height: 600px;
            max-height: calc(100vh - 120px);
            min-height: 400px;
            border: none;
            border-radius: 18px;
            overflow: hidden;
            z-index: 10000;
            background: #fff;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }

        #chatbot-container.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        #chatbot-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #fff;
            border-radius: 18px;
        }

        /* Disclaimer */
        .chatbot-disclaimer {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10001;
            background: #fff;
            padding: 6px 0 8px 0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
            font-size: 0.85em;
            color: #888;
            text-align: center;
        }

        /* Responsive Design */
        
        /* Desktop Large */
        @media (min-width: 1200px) {
            #chatbot-container {
                width: 420px;
                height: 620px;
            }
        }

        /* Desktop Standard */
        @media (min-width: 1025px) and (max-width: 1199px) {
            #chatbot-container {
                width: 400px;
                height: 580px;
            }
        }

        /* Tablette */
        @media (min-width: 769px) and (max-width: 1024px) {
            #chatbot-container {
                width: 380px;
                height: 520px;
                bottom: 90px;
                right: 15px;
                max-height: calc(100vh - 110px);
            }
            
            #chatbot-widget {
                bottom: 15px;
                right: 15px;
                width: 55px;
                height: 55px;
                font-size: 1.4rem;
            }
        }

        /* Mobile Landscape */
        @media (min-width: 481px) and (max-width: 768px) {
            #chatbot-container {
                bottom: 80px;
                right: 10px;
                left: 10px;
                width: calc(100vw - 20px);
                height: calc(100vh - 120px);
                max-height: calc(100vh - 120px);
                min-height: 350px;
                border-radius: 15px;
            }
            
            #chatbot-container iframe {
                border-radius: 15px;
            }
            
            #chatbot-widget {
                bottom: 15px;
                right: 15px;
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }

        /* Mobile Portrait */
        @media (max-width: 480px) {
            #chatbot-container {
                position: fixed;
                bottom: 0 !important;
                left: 0 !important;
                right: 0 !important;
                top: auto !important;
                width: 100vw !important;
                height: 70vh !important;
                max-height: 70vh !important;
                min-height: 400px !important;
                border-radius: 16px 16px 0 0 !important;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            }
            
            #chatbot-container iframe {
                height: 100% !important;
                min-height: 400px !important;
                border-radius: 16px 16px 0 0 !important;
            }
            
            #chatbot-widget {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }

        /* Petits écrans mobiles */
        @media (max-width: 480px) and (max-height: 599px) {
            #chatbot-container {
                height: 85vh !important;
                max-height: 85vh !important;
                min-height: 350px !important;
            }
        }

        /* Ultra petits écrans */
        @media (max-width: 360px) {
            #chatbot-widget {
                bottom: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
            }
            
            #chatbot-container {
                height: 75vh !important;
                max-height: 75vh !important;
                min-height: 320px !important;
            }
        }

        /* Écrans très courts (landscape sur petits mobiles) */
        @media (max-height: 480px) and (max-width: 768px) {
            #chatbot-container {
                top: 0 !important;
                height: 100vh !important;
                max-height: 100vh !important;
                border-radius: 0 !important;
            }
            
            #chatbot-container iframe {
                border-radius: 0 !important;
            }
        }

        /* Animation d'apparition */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

<!-- Widget flottant universel pour le chatbot Chronos -->
    <div id="chatbot-widget" role="button" aria-label="Ouvrir le chatbot Chronos" tabindex="0">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="18" fill="url(#paint0_linear)" />
            <path d="M18 10C21.866 10 25 13.134 25 17C25 20.866 21.866 24 18 24C14.134 24 11 20.866 11 17C11 13.134 14.134 10 18 10ZM18 22C20.7614 22 23 19.7614 23 17C23 14.2386 20.7614 12 18 12C15.2386 12 13 14.2386 13 17C13 19.7614 15.2386 22 18 22Z" fill="#fff"/>
            <circle cx="18" cy="17" r="2" fill="#fff"/>
            <defs>
                <linearGradient id="paint0_linear" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#094102"/>
                    <stop offset="1" stop-color="#ff5700"/>
                </linearGradient>
            </defs>
        </svg>
    </div>

    <!-- Conteneur du chatbot -->
    <div id="chatbot-container" role="dialog" aria-label="Chatbot Chronos" aria-hidden="true">
        <iframe src="Chatbot.html" title="Interface du chatbot Chronos" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        
        <!-- Disclaimer optionnel -->
        <div class="chatbot-disclaimer" style="display: none;">
            Powered by Chronos AI
        </div>
    </div>

    <script>
        // Variables globales
        const widget = document.getElementById("chatbot-widget");
        const container = document.getElementById("chatbot-container");
        let isOpen = false;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let widgetStartX = 0;
        let widgetStartY = 0;

        // Fonction pour ouvrir/fermer le chatbot
        function toggleChatbot() {
            if (!isDragging) {
                isOpen = !isOpen;
                
                if (isOpen) {
                    container.style.display = "block";
                    container.setAttribute('aria-hidden', 'false');
                    // Force un reflow avant d'ajouter la classe pour l'animation
                    container.offsetHeight;
                    container.classList.add('show');
                    widget.style.zIndex = "10001";
                    widget.setAttribute('aria-label', 'Fermer le chatbot Chronos');
                } else {
                    container.classList.remove('show');
                    container.setAttribute('aria-hidden', 'true');
                    widget.setAttribute('aria-label', 'Ouvrir le chatbot Chronos');
                    
                    // Attendre la fin de l'animation avant de cacher
                    setTimeout(() => {
                        container.style.display = "none";
                        widget.style.zIndex = "9999";
                    }, 300);
                }
            }
        }

        // Gestion du clic sur le widget
        widget.addEventListener("click", toggleChatbot);

        // Gestion du clavier (Entrée et Espace)
        widget.addEventListener("keydown", function(e) {
            if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                toggleChatbot();
            }
        });

        // Fermer avec Escape
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape" && isOpen) {
                isOpen = false;
                container.classList.remove('show');
                container.setAttribute('aria-hidden', 'true');
                widget.setAttribute('aria-label', 'Ouvrir le chatbot Chronos');
                
                setTimeout(() => {
                    container.style.display = "none";
                    widget.style.zIndex = "9999";
                }, 300);
            }
        });

        // Fermer en cliquant en dehors
        document.addEventListener("click", function(e) {
            if (isOpen && !container.contains(e.target) && !widget.contains(e.target)) {
                isOpen = false;
                container.classList.remove('show');
                container.setAttribute('aria-hidden', 'true');
                widget.setAttribute('aria-label', 'Ouvrir le chatbot Chronos');
                
                setTimeout(() => {
                    container.style.display = "none";
                    widget.style.zIndex = "9999";
                }, 300);
            }
        });

        // Fonctionnalité de drag pour le widget
        function startDrag(e) {
            isDragging = false; // Reset au début
            const rect = widget.getBoundingClientRect();
            
            if (e.type === 'mousedown') {
                dragStartX = e.clientX;
                dragStartY = e.clientY;
            } else if (e.type === 'touchstart') {
                dragStartX = e.touches[0].clientX;
                dragStartY = e.touches[0].clientY;
            }
            
            widgetStartX = rect.left;
            widgetStartY = rect.top;
            
            widget.style.transition = 'none';
            widget.style.cursor = 'grabbing';
            
            // Prévenir la sélection de texte
            e.preventDefault();
        }

        function drag(e) {
            let currentX, currentY;
            
            if (e.type === 'mousemove') {
                currentX = e.clientX;
                currentY = e.clientY;
            } else if (e.type === 'touchmove') {
                currentX = e.touches[0].clientX;
                currentY = e.touches[0].clientY;
            }
            
            const deltaX = currentX - dragStartX;
            const deltaY = currentY - dragStartY;
            
            // Si le mouvement est significatif, on considère que c'est un drag
            if (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5) {
                isDragging = true;
                
                let newX = widgetStartX + deltaX;
                let newY = widgetStartY + deltaY;
                
                // Contraintes pour garder le widget visible
                const maxX = window.innerWidth - widget.offsetWidth;
                const maxY = window.innerHeight - widget.offsetHeight;
                
                newX = Math.max(0, Math.min(newX, maxX));
                newY = Math.max(0, Math.min(newY, maxY));
                
                widget.style.left = newX + 'px';
                widget.style.top = newY + 'px';
                widget.style.right = 'auto';
                widget.style.bottom = 'auto';
            }
        }

        function endDrag() {
            widget.style.transition = '';
            widget.style.cursor = 'pointer';
            
            // Délai pour éviter le clic immédiat après le drag
            setTimeout(() => {
                isDragging = false;
            }, 100);
        }

        // Events pour mouse
        widget.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', endDrag);

        // Events pour touch
        widget.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('touchend', endDrag);

        // Gestion du redimensionnement de la fenêtre
        window.addEventListener('resize', function() {
            // Repositionner le widget si nécessaire
            const rect = widget.getBoundingClientRect();
            const maxX = window.innerWidth - widget.offsetWidth;
            const maxY = window.innerHeight - widget.offsetHeight;
            
            if (rect.left > maxX || rect.top > maxY) {
                widget.style.left = Math.min(rect.left, maxX) + 'px';
                widget.style.top = Math.min(rect.top, maxY) + 'px';
            }
        });
    </script>
