<!-- Widget flottant universel pour le chatbot Chronos -->
<div id="chatbot-widget" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(90deg,#094102,#ff5700);
  color: white;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: grab;
  z-index: 9999;
  font-size: 1.5rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  transition: box-shadow 0.2s;
">
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <circle cx="18" cy="18" r="18" fill="url(#paint0_linear)" />
    <path d="M18 10C21.866 10 25 13.134 25 17C25 20.866 21.866 24 18 24C14.134 24 11 20.866 11 17C11 13.134 14.134 10 18 10ZM18 22C20.7614 22 23 19.7614 23 17C23 14.2386 20.7614 12 18 12C15.2386 12 13 14.2386 13 17C13 19.7614 15.2386 22 18 22Z" fill="#fff"/>
    <circle cx="18" cy="17" r="2" fill="#fff"/>
    <defs>
      <linearGradient id="paint0_linear" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
        <stop stop-color="#094102"/>
        <stop offset="1" stop-color="#ff5700"/>
      </linearGradient>
    </defs>
  </svg>
</div>

<!-- Conteneur du chatbot (iframe) -->
<div id="chatbot-container" style="
  display: none;
  position: fixed;
  bottom: 90px;
  right: 20px;
  left: auto;
  width: 96vw;
  max-width: 420px;
  min-width: 280px;
  height: 80vh;
  max-height: 540px;
  min-height: 400px;
  border: 1px solid #ccc;
  border-radius: 18px;
  overflow: hidden;
  z-index: 10000;
  background: #fff;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
">

  <div id="chatbot-close" style="position:absolute;top:8px;right:8px;width:32px;height:32px;background:#2b2d42;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10001;font-size:1.3em;">&times;</div>
  <iframe src="Chatbot.html" style="width:100%;height:100%;border:none;display:block;"></iframe>
</div>

<script>
  const widget = document.getElementById("chatbot-widget");
  const container = document.getElementById("chatbot-container");
  const closeBtn = document.getElementById("chatbot-close");

  widget.addEventListener("click", () => {
    container.style.display = container.style.display === "none" ? "block" : "none";
    // Si le widget a été déplacé, on garde sa position
    if(widget.style.left && widget.style.top){
      widget.style.right = '';
      widget.style.bottom = '';
      widget.style.position = 'fixed';
    }
  });
  closeBtn.addEventListener("click", () => {
    container.style.display = "none";
  });

  // Accessibilité clavier : touche Escape pour fermer
  document.addEventListener("keydown", function(e){
    if(e.key === "Escape") container.style.display = "none";
  });

  // Fermer en cliquant en dehors
  document.addEventListener("click", function(e){
    if(container.style.display === "block" && !container.contains(e.target) && !widget.contains(e.target)){
      container.style.display = "none";
    }
  });

  // Rendre le widget flottant draggable
  let dragWidget = false, widgetOffsetX = 0, widgetOffsetY = 0;
  widget.addEventListener('mousedown', function(e){
    dragWidget = true;
    widgetOffsetX = e.clientX - widget.getBoundingClientRect().left;
    widgetOffsetY = e.clientY - widget.getBoundingClientRect().top;
    widget.style.transition = 'none';
    widget.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', function(e){
    if(dragWidget){
      let x = e.clientX - widgetOffsetX;
      let y = e.clientY - widgetOffsetY;
      widget.style.left = x + 'px';
      widget.style.top = y + 'px';
      widget.style.right = '';
      widget.style.bottom = '';
      widget.style.position = 'fixed';
    }
  });
  document.addEventListener('mouseup', function(){
    dragWidget = false;
    widget.style.transition = '';
    widget.style.cursor = 'grab';
  });
</script>
