    .gaming-card {

      position: relative;

    }

    .gaming-card::before {
      content: '';

      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, #094102, #FF5700, #094102);

    }

    .neon-glow {
      box-shadow: 0 0 20px rgba(255, 87, 0, 0.3), 0 0 40px rgba(9, 65, 2, 0.2);

    }

    .neon-glow:hover {

    }

    .mobile-grid {

    @media (max-width: 640px) {

      }
    }

      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-elements::before,
    .floating-elements::after {
      content: '';

      width: 20px;
      height: 20px;
      background: rgba(255, 87, 0, 0.1);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    .floating-elements::before {
      top: 20%;
      left: 10%;
      animation-delay: -2s;
    }

    .floating-elements::after {
      bottom: 20%;
      right: 10%;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

      background: linear-gradient(90deg, #094102, #FF5700);
      height: 100%;
      border-radius: 4px;
      position: relative;
      animation: pulse 2s ease-in-out infinite alternate;
    }

      from { box-shadow: 0 0 5px rgba(255, 87, 0, 0.5); }
      to { box-shadow: 0 0 20px rgba(255, 87, 0, 0.8); }

      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease-out;
    }

    .feedback-modal-content {
      background: linear-gradient(135deg, rgba(9, 65, 2, 0.95), rgba(255, 87, 0, 0.2));
      border: 2px solid rgba(255, 87, 0, 0.4);
      border-radius: 20px;
      padding: 2rem;
      margin: 1rem;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

      height: 60px;

      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;

      color: #22c55e;
    }

    .feedback-icon.warning {
      background: rgba(251, 191, 36, 0.2);
      border: 2px solid #fbbf24;
      color: #fbbf24;
    }

      border: 2px solid #ef4444;
      color: #ef4444;
    }

    @keyframes fadeIn {
      from { opacity: 0; }

      from {

          React.useEffect(() => {
            if (!isOpen) return;
            
            const timer = setInterval(() => {
              setAutoCloseTime(prev => {
                if (prev <= 1) {
                  onClose();
                  return 5;
                }
                return prev - 1;
              });
            }, 1000);

            return () => clearInterval(timer);
          }, [isOpen, onClose]);

          React.useEffect(() => {
            if (isOpen) setAutoCloseTime(5);
          }, [isOpen]);

          if (!isOpen || !feedbackData) return null;

          const getIconType = () => {
            if (timeOut) return 'error';
            if (feedbackData.score >= 12) return 'success';
            if (feedbackData.score >= 5) return 'warning';
            return 'error';
          };

          const getIcon = () => {
            if (timeOut) return '⏰';
            if (feedbackData.score >= 12) return '✅';
            if (feedbackData.score >= 5) return '⚠️';
            return '❌';
          };

            <div className="feedback-modal" onClick={onClose}>

                <div className={`feedback-icon ${getIconType()}`}>
                  {getIcon()}

                <div className="text-center">

                        {feedbackData.score >= 12 ? 'Excellente réponse !' : 
                         feedbackData.score >= 5 ? 'Réponse correcte' : 'Réponse à améliorer'}

                        +{feedbackData.totalPoints} points

                      <p className="text-lg mb-6 text-gray-300">{feedbackData.feedback}</p>

                  <div className="text-left">

                    {question.idealResponse && (

                  <div className="flex flex-col sm:flex-row gap-3 mt-6">

                      className="flex-1 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 px-6 py-3 rounded-xl font-bold transition-all hover:scale-105"

        /***** Composant InterviewMaster (adapté) *****/
        const InterviewMaster = () => {

          const [playerStats, setPlayerStats] = React.useState({ questionsAnswered:0, averageScore:0, strongestCategory:null, weakestCategory:null, improvementRate:0, sessionHistory: [] });
          const [reviewQuestions, setReviewQuestions] = React.useState([]);

          const [showSettings, setShowSettings] = React.useState(false);
          const [selectedCategory, setSelectedCategory] = React.useState('all');
          const [currentTheme, setCurrentTheme] = React.useState(themes[0]);
          const [soundEnabled, setSoundEnabled] = React.useState(true);
          const [questionHistory, setQuestionHistory] = React.useState([]);
          const [wrongAnswers, setWrongAnswers] = React.useState([]);
          const [toasts, setToasts] = React.useState([]);
          const [showResetModal, setShowResetModal] = React.useState(false);
          const [lastPlayDate, setLastPlayDate] = React.useState(null);
          const [consecutiveDays, setConsecutiveDays] = React.useState(0);
          const [dailyStreak, setDailyStreak] = React.useState(0);
          const [perfectScoreStreak, setPerfectScoreStreak] = React.useState(0);
          const [fastResponseCount, setFastResponseCount] = React.useState(0);
          const [categoriesCompleted, setCategoriesCompleted] = React.useState({});
          const [shareCount, setShareCount] = React.useState(0);

          // --- LocalStorage persistence keys and helpers ---
          const STORAGE_KEYS = {
            achievements: 'im_interview_achievements_v1',
            stats: 'im_interview_playerstats_v1',
            review: 'im_interview_reviewquestions_v1',
            tracking: 'im_interview_tracking_v1'  // AJOUT : clé de tracking des questions
          };

          // Helpers pour tracking des questions (load / save)
          const loadQuestionTracking = () => {
            try {
              if (typeof localStorage === 'undefined') return {};
              const raw = localStorage.getItem(STORAGE_KEYS.tracking);
              return raw ? JSON.parse(raw) : {};
            } catch (e) {
              console.warn('Failed to load question tracking:', e);
              return {};
            }
          };

          const saveQuestionTracking = (trackingData) => {
            try {
              if (typeof localStorage === 'undefined') return;
              localStorage.setItem(STORAGE_KEYS.tracking, JSON.stringify(trackingData));
            } catch (e) {
              console.warn('Failed to save question tracking:', e);
            }
          };

          // State pour le tracking des questions (map id -> { lastUsed, timesAsked })
          const [questionTracking, setQuestionTracking] = React.useState({});

          // Load persisted state on first mount
          React.useEffect(() => {
            try {
              if (typeof localStorage === 'undefined') return;
              const rawAch = localStorage.getItem(STORAGE_KEYS.achievements);
              if (rawAch) {
                const parsed = JSON.parse(rawAch);
                if (Array.isArray(parsed)) setPlayerAchievements(parsed);
              }

              const rawStats = localStorage.getItem(STORAGE_KEYS.stats);
              if (rawStats) {
                const parsed = JSON.parse(rawStats);
                if (parsed && typeof parsed === 'object') {
                  if (parsed.questionsAnswered !== undefined) setPlayerStats(prev => ({ ...prev, ...parsed }));
                  if (parsed.totalXP !== undefined) setTotalXP(parsed.totalXP);
                  if (parsed.playerLevel !== undefined) setPlayerLevel(parsed.playerLevel);
                  if (parsed.gamesPlayed !== undefined) setGamesPlayed(parsed.gamesPlayed);
                  if (parsed.bestScore !== undefined) setBestScore(parsed.bestScore);
                  if (parsed.bestStreak !== undefined) setBestStreak(parsed.bestStreak);
                  if (parsed.skills !== undefined) setSkills(prev => ({ ...prev, ...parsed.skills }));
                  if (parsed.lastPlayDate !== undefined) setLastPlayDate(parsed.lastPlayDate);
                  if (parsed.consecutiveDays !== undefined) setConsecutiveDays(parsed.consecutiveDays);
                  if (parsed.dailyStreak !== undefined) setDailyStreak(parsed.dailyStreak);
                  if (parsed.perfectScoreStreak !== undefined) setPerfectScoreStreak(parsed.perfectScoreStreak);
                  if (parsed.fastResponseCount !== undefined) setFastResponseCount(parsed.fastResponseCount);
                  if (parsed.shareCount !== undefined) setShareCount(parsed.shareCount);
                }
              }

              const rawReview = localStorage.getItem(STORAGE_KEYS.review);
              if (rawReview) {
                const parsed = JSON.parse(rawReview);
                if (Array.isArray(parsed)) setReviewQuestions(parsed);
              }

              // Load question tracking map
              try {
                const tracking = loadQuestionTracking();
                if (tracking && typeof tracking === 'object') setQuestionTracking(tracking);
              } catch (e) { /* ignore */ }
            } catch (e) {
              // ignore localStorage errors
              console.warn('LocalStorage load failed', e);
            }
          }, []);

          // Toast helper
          const pushToast = (text, opts = {}) => {
            const id = Math.random().toString(36).slice(2,9);
            const toast = { id, text, created: Date.now(), ...opts };
            setToasts(prev => [...prev, toast]);
            const ttl = opts.ttl || 4000;
            setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), ttl);
          };

          // Daily tracking helper
          const updateDailyTracking = () => {
            const today = new Date().toDateString();
            const yesterday = new Date(Date.now() - 86400000).toDateString();
            
            if (lastPlayDate === today) return; // Déjà joué aujourd'hui
            
            if (lastPlayDate === yesterday) {
              setConsecutiveDays(prev => prev + 1);
              setDailyStreak(prev => prev + 1);
            } else {
              setConsecutiveDays(1);
              setDailyStreak(1);
            }
            
            setLastPlayDate(today);
          };

          // Achievement unlock helper
          const unlockAchievement = (id) => {
            setPlayerAchievements(prev => {
              const ix = prev.findIndex(a => a.id === id);
              if (ix === -1) return prev;
              if (prev[ix].unlocked) return prev;
              const updated = [...prev];
              updated[ix] = { ...updated[ix], unlocked: true };
              // push a toast
              pushToast(`Achievement déverrouillé: ${updated[ix].name}`);
              return updated;
            });
          };

          // Persist achievements when they change
          React.useEffect(() => {
            try {
              if (typeof localStorage === 'undefined') return;
              localStorage.setItem(STORAGE_KEYS.achievements, JSON.stringify(playerAchievements));
            } catch (e) {
              console.warn('Save achievements failed', e);
            }
          }, [playerAchievements]);

          // Persist combined stats and progress
          React.useEffect(() => {
            try {
              if (typeof localStorage === 'undefined') return;
              const payload = {
                questionsAnswered: playerStats.questionsAnswered,
                averageScore: playerStats.averageScore,
                sessionHistory: playerStats.sessionHistory,
                totalXP,
                playerLevel,
                gamesPlayed,
                bestScore,
                bestStreak,
                skills,
                lastPlayDate,
                consecutiveDays,
                dailyStreak,
                perfectScoreStreak,
                fastResponseCount,
                shareCount
              };
              localStorage.setItem(STORAGE_KEYS.stats, JSON.stringify(payload));
            } catch (e) {
              console.warn('Save stats failed', e);
            }
          }, [playerStats, totalXP, playerLevel, gamesPlayed, bestScore, bestStreak, skills, lastPlayDate, consecutiveDays, dailyStreak, perfectScoreStreak, fastResponseCount, shareCount]);

          // Persist reviewQuestions
          React.useEffect(() => {
            try {
              if (typeof localStorage === 'undefined') return;
              localStorage.setItem(STORAGE_KEYS.review, JSON.stringify(reviewQuestions));
            } catch (e) {
              console.warn('Save review failed', e);
            }
          }, [reviewQuestions]);

          // Auto-save question tracking
          React.useEffect(() => {
            try {
              if (typeof localStorage === 'undefined') return;
              if (Object.keys(questionTracking).length > 0) {
                saveQuestionTracking(questionTracking);
              }
            } catch (e) {
              console.warn('Save question tracking failed', e);
            }
          }, [questionTracking]);

          React.useEffect(() => {
            let timer;
            // Fix: ensure timeout handler called only when playing and timeLeft reaches 0
            if (gameState === 'playing' && !showFeedback) {
              if (timeLeft > 0) {
                timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
              } else if (timeLeft === 0) {
                handleTimeOut();
              }
            }
            return () => clearTimeout(timer);
          }, [timeLeft, gameState, showFeedback, gameMode]);

          const shuffleArray = (array) => {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
          };

          // Filtre intelligent avec priorité + cooldown (par défaut 48h)
          const filterQuestions = (pool, cooldownHours = 48) => {
            const now = Date.now();
            const cooldownMs = cooldownHours * 60 * 60 * 1000; // heures -> ms
            
            const scored = pool.map(q => {
              const tracking = questionTracking[q.id] || { lastUsed: null, timesAsked: 0 };
              const timeSinceLastUse = tracking.lastUsed ? now - tracking.lastUsed : Infinity;
              const timesAsked = tracking.timesAsked || 0;

              let priority = timesAsked * 100;
              if (timeSinceLastUse < cooldownMs) priority += 1000;
              if (timesAsked === 0) priority -= 50;

              return { q, priority };
            });

            scored.sort((a, b) => a.priority - b.priority);
            return scored.map(s => ({ ...s.q }));
          };

          const startGame = (mode) => {
            updateDailyTracking();
            setGameMode(mode);
            setGameState('playing');
            setCurrentQuestion(0);
            setScore(0);
            setStreak(0);
            setTimeLeft(mode === 'timed' ? 15 : 30);

            let pool = [...questionDatabase];
            if (selectedCategory !== 'all') pool = pool.filter(q => q.category === selectedCategory);

            // Apply smart filter with 48h cooldown
            const prioritized = filterQuestions(pool, 48);

            // Expert mode: only difficulty 3
            let finalPool = prioritized;
            if (mode === 'expert') {
              finalPool = finalPool.filter(q => q.difficulty === 3);
              setTimeLeft(12);
            }

            const questionCount = (mode === 'survival' || mode === 'timed') ? 10 : 5;
            const finalQuestions = finalPool.slice(0, questionCount);

            // Update tracking immutably for chosen questions
            const now = Date.now();
            const newTracking = { ...questionTracking };
            finalQuestions.forEach(q => {
              const prev = newTracking[q.id] || { lastUsed: null, timesAsked: 0 };
              newTracking[q.id] = { lastUsed: now, timesAsked: (prev.timesAsked || 0) + 1 };
            });
            setQuestionTracking(newTracking);

            setQuestions(finalQuestions);
          };

          // Start review mode using reviewQuestions queue
          const startReview = () => {
            if (!reviewQuestions || reviewQuestions.length === 0) {
              alert("Pas de questions à réviser. Jouez d'abord quelques parties !");
              return;
            }
            setGameMode('review');
            setGameState('playing');
            setCurrentQuestion(0);
            setScore(0);
            setStreak(0);
            setTimeLeft(45);
            setQuestions(shuffleArray(reviewQuestions).slice(0, 5));
          };

          const handleTimeOut = () => {
            setSelectedAnswer(null);
            setShowFeedback(true);
            setStreak(0);
            
            // Ouvrir le modal pour timeout
            setFeedbackData({ score: 0, totalPoints: 0, feedback: 'Temps écoulé !' });
            setShowFeedbackModal(true);
          };

          const selectAnswer = (answerIndex) => {
            if (selectedAnswer !== null || showFeedback) return;
            setSelectedAnswer(answerIndex);
            setShowFeedback(true);

            const answer = questions[currentQuestion].answers[answerIndex];
            const points = answer.score;
            const timeBonus = gameMode === 'timed' ? Math.floor(timeLeft / 3) : Math.floor(timeLeft / 6);
            const totalPoints = points + timeBonus;

            setScore(prev => prev + totalPoints);

            // Préparer les données pour le modal
            setFeedbackData({
              score: points,
              totalPoints,
              feedback: answer.feedback
            });
            
            // Ouvrir le modal au lieu d'afficher le feedback inline
            setShowFeedbackModal(true);

            // Mise à jour des stats (reste identique)
            setPlayerStats(prev => {
              const newQuestions = prev.questionsAnswered + 1;
              const newAverage = ((prev.averageScore * prev.questionsAnswered) + totalPoints) / newQuestions;
              const newHistory = [...prev.sessionHistory, { 
                questionId: questions[currentQuestion].id, 
                score: totalPoints, 
                correct: points >= 12 
              }].slice(-200);
              return { 
                ...prev, 
                questionsAnswered: newQuestions, 
                averageScore: newAverage, 
                sessionHistory: newHistory 
              };
            });

            if (points >= 12) {
              setStreak(prev => prev + 1);
              addXP(totalPoints);
              const skillMap = {
                'technique': 'technique',
                'comportementale': 'leadership',
                'classique': 'communication',
                'piege': 'adaptabilite'

                endGame();

                nextQuestion();

            }, 300);

          const endGame = () => {
            setGameState('results');
            setGamesPlayed(prev => prev + 1);

            if (streak > bestStreak) setBestStreak(streak);
            // Check for achievements that may unlock at end of game
            // first_game: if this was the first finished game (gamesPlayed was 0)
            if (gamesPlayed === 0) unlockAchievement('first_game');
            // perfect_score: if player scored maximum across questions (15 per question)
            const maxPossible = questions.length * 15;
            if (score === maxPossible) unlockAchievement('perfect_score');
            // persistent: if player reached threshold now
            if (gamesPlayed + 1 >= 10) unlockAchievement('persistent');

          const addXP = (points) => {
            const newXP = totalXP + points;
            setTotalXP(newXP);
            const newLevel = Math.floor(newXP / 100) + 1;
            if (newLevel > playerLevel) setPlayerLevel(newLevel);
          };

          const checkAchievements = (points, timeLeft) => {
            const currentHour = new Date().getHours();
            
            playerAchievements.forEach(a => {
              if (a.unlocked) return;
              let shouldUnlock = false;
              
              switch(a.id) {
                case 'first_game':
                  shouldUnlock = gamesPlayed === 0;

                case 'perfect_score':
                  shouldUnlock = points === 15 && streak >= 4;

                  shouldUnlock = timeLeft > 20;
                  break;

                  break;

                      const newStreak = prev + 1;
                      return newStreak;

                  shouldUnlock = false;
                  break;
                case 'daily_player':
                  shouldUnlock = consecutiveDays >= 7;
                  break;
                case 'night_owl':
                  shouldUnlock = currentHour >= 0 && currentHour < 6;
                  break;
                case 'level_10':
                  shouldUnlock = playerLevel >= 10;
                  break;
                case 'social_butterfly':
                  shouldUnlock = shareCount >= 5;
                  break;

                  // Logic pour amélioration 3 fois
                  shouldUnlock = false;
                  break;
                case 'sector_expert':
                  // Logic pour maîtriser un secteur
                  shouldUnlock = false;
                  break;

                  // Logic pour régularité mensuelle
                  shouldUnlock = false;
                  break;
                case 'helpful':
                  // Logic pour feedback utiles
                  shouldUnlock = false;
                  break;

                  break;
                case 'category_master_classic':

                  shouldUnlock = false;
                  break;
                default:
                  shouldUnlock = false;

              if (shouldUnlock) unlockAchievement(a.id);

            setGamesPlayed(0);
            setBestScore(0);

            <div className={`progress-bar-custom ${className}`}>
              <div 
                className="progress-bar-fill transition-all duration-700 ease-out"
                style={{ width: `${Math.min((current / max) * 100, 100)}%` }}
              />
            </div>
          );

          const TimerCircle = ({ time, maxTime }) => {
            const percentage = (time / maxTime) * 100;
            const circumference = 2 * Math.PI * 20;
            const strokeDasharray = circumference;
            const strokeDashoffset = circumference - (percentage / 100) * circumference;
            return (
              <div className="relative w-16 h-16">
                <svg className="w-16 h-16 transform -rotate-90">
                  <circle cx="32" cy="32" r="20" stroke="currentColor" strokeWidth="4" fill="transparent" className="text-gray-200" />
                  <circle cx="32" cy="32" r="20" stroke="currentColor" strokeWidth="4" fill="transparent" strokeDasharray={strokeDasharray} strokeDashoffset={strokeDashoffset} className={`transition-all duration-1000 ${time > 10 ? 'text-green-500' : time > 5 ? 'text-yellow-500' : 'text-red-500'}`} />
                </svg>
                <div className="absolute inset-0 flex items-center justify-center">
                  <span className={`text-lg font-bold ${time > 10 ? 'text-green-500' : time > 5 ? 'text-yellow-500' : 'text-red-500'}`}>{time}</span>
                </div>
              </div>
            );
          };

          if (gameState === 'menu') {
  return (
    <div className="min-h-screen bg-gradient-to-br from-green-900 via-green-800 to-orange-900 text-white relative overflow-hidden">

          {/* Header controls */}
          <div className="flex justify-end mb-4">
            <div className="flex space-x-2">
              <button 
                onClick={() => setShowSettings(!showSettings)} 
                className="neon-glow bg-black/30 hover:bg-black/50 p-3 rounded-xl transition-all"
              >
                <Settings className="w-5 h-5" />
              </button>
              <button 
                onClick={() => setSoundEnabled(!soundEnabled)} 
                className="neon-glow bg-black/30 hover:bg-black/50 p-3 rounded-xl transition-all"
              >
                {soundEnabled ? <Volume2 className="w-5 h-5" /> : <VolumeX className="w-5 h-5" />}
              </button>
            </div>
          </div>
          
          {/* Logo et titre */}
          <div className="gaming-card p-8 mb-8">
            <div className="flex items-center justify-center mb-4">
              <Trophy className="w-16 h-16 text-orange-400 mr-4 animate-bounce" />
              <h1 className="text-4xl md:text-6xl font-bold bg-gradient-to-r from-orange-400 via-orange-500 to-green-400 bg-clip-text text-transparent">
                Interview Master
              </h1>
            </div>
            <p className="text-xl text-gray-300 mb-6">Maîtrisez l'art de l'entretien d'embauche !</p>
            
            {/* Stats rapides */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div className="game-mode-card p-4 text-center">
                <div className="text-2xl font-bold text-orange-400">{playerLevel}</div>
                <div className="text-sm text-gray-300">Niveau</div>
              </div>
              <div className="game-mode-card p-4 text-center">
                <div className="text-2xl font-bold text-green-400">{bestScore}</div>
                <div className="text-sm text-gray-300">Meilleur Score</div>
              </div>
              <div className="game-mode-card p-4 text-center">
                <div className="text-2xl font-bold text-orange-400">{bestStreak}</div>
                <div className="text-sm text-gray-300">Meilleur Streak</div>
              </div>
              <div className="game-mode-card p-4 text-center">
                <div className="text-2xl font-bold text-green-400">{gamesPlayed}</div>
                <div className="text-sm text-gray-300">Parties</div>
              </div>
            </div>
          </div>
        </header>

        {/* Modes de jeu principaux */}
        <div className="mobile-grid mb-8">
          <button 
            onClick={() => startGame('training')} 
            className="game-mode-card neon-glow group"
          >
            <div className="floating-elements"></div>
            <Brain className="w-12 h-12 mb-4 mx-auto text-green-400 group-hover:scale-110 transition-transform" />
            <h3 className="text-xl font-bold mb-2 text-white">Entraînement</h3>
            <p className="text-sm text-gray-300">5 questions pour s'échauffer</p>
            <div className="absolute bottom-2 right-2 text-xs bg-green-600 px-2 py-1 rounded-full">
              Facile
            </div>
          </button>
          
          <button 
            onClick={() => startGame('survival')} 
            className="game-mode-card neon-glow group"
          >
            <div className="floating-elements"></div>
            <Target className="w-12 h-12 mb-4 mx-auto text-orange-400 group-hover:scale-110 transition-transform" />
            <h3 className="text-xl font-bold mb-2 text-white">Survie</h3>
            <p className="text-sm text-gray-300">Élimination à la première erreur</p>
            <div className="absolute bottom-2 right-2 text-xs bg-red-600 px-2 py-1 rounded-full">
              Hardcore
            </div>
          </button>
          
          <button 
            onClick={() => startGame('timed')} 
            className="game-mode-card neon-glow group"
          >
            <div className="floating-elements"></div>
            <Zap className="w-12 h-12 mb-4 mx-auto text-orange-400 group-hover:scale-110 transition-transform" />
            <h3 className="text-xl font-bold mb-2 text-white">Chrono</h3>
            <p className="text-sm text-gray-300">15 secondes par question</p>
            <div className="absolute bottom-2 right-2 text-xs bg-orange-600 px-2 py-1 rounded-full">
              Speed
            </div>
          </button>
          
          <button 
            onClick={() => setGameState('profile')} 
            className="game-mode-card neon-glow group"
          >
            <div className="floating-elements"></div>
            <User className="w-12 h-12 mb-4 mx-auto text-green-400 group-hover:scale-110 transition-transform" />
            <h3 className="text-xl font-bold mb-2 text-white">Profil</h3>
            <p className="text-sm text-gray-300">Achievements & Stats</p>
            <div className="absolute bottom-2 right-2 text-xs bg-purple-600 px-2 py-1 rounded-full">
              Profil
            </div>
          </button>
        </div>

        {/* Modes secondaires */}
        <div className="mobile-grid mb-8">
          <button 
            onClick={() => startReview()} 
            className="game-mode-card neon-glow group"
          >
            <div className="floating-elements"></div>
            <RotateCw className="w-10 h-10 mb-3 mx-auto text-orange-400 group-hover:rotate-180 transition-all duration-500" />
            <h3 className="text-lg font-bold mb-2 text-white">Révision</h3>
            <p className="text-sm text-gray-300">Questions ratées ({reviewQuestions.length})</p>
          </button>

          <button 
            onClick={() => startGame('expert')} 
            className="game-mode-card neon-glow group border-2 border-orange-500"
          >
            <div className="floating-elements"></div>
            <TargetIcon className="w-10 h-10 mb-3 mx-auto text-orange-400 group-hover:scale-110 transition-transform" />
            <h3 className="text-lg font-bold mb-2 text-white">Expert</h3>
            <p className="text-sm text-gray-300">Questions difficiles uniquement</p>
            <div className="absolute top-2 right-2 text-xs bg-gradient-to-r from-orange-500 to-red-500 px-2 py-1 rounded-full animate-pulse">
              PRO
            </div>
          </button>
        </div>

        {/* Sélecteur de catégorie */}
        <div className="gaming-card p-6 text-center">
          <h4 className="text-lg font-semibold mb-4 text-white">Catégorie d'entraînement :</h4>
          <div className="flex flex-wrap justify-center gap-3">
            {['all', 'classique', 'technique', 'piege', 'comportementale'].map(category => (
              <button 
                key={category} 
                onClick={() => setSelectedCategory(category)} 
                className={`px-4 py-2 rounded-full transition-all font-medium ${
                  selectedCategory === category 
                    ? 'bg-gradient-to-r from-orange-500 to-green-500 text-white shadow-lg' 
                    : 'bg-black/30 hover:bg-black/50 text-gray-300 hover:text-white border border-orange-500/30'
                }`}
              >
                {category === 'all' ? 'Toutes' : category.charAt(0).toUpperCase() + category.slice(1)}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

          if (gameState === 'playing') {
            const question = questions[currentQuestion];
            if (!question) return <div>Loading...</div>;

            return (
              <div className={`min-h-screen bg-gradient-to-br ${currentTheme.colors} text-white`}>
                <div className="container mx-auto px-4 py-8 max-w-4xl">
                  <div className="flex justify-between items-center mb-8">
                    <button onClick={() => setGameState('menu')} className="bg-white/10 hover:bg-white/20 p-3 rounded-lg transition-all">
                      <Home className="w-6 h-6" />
                    </button>
                    
                    <div className="text-center">
                      <div className="text-sm text-gray-300">Question {currentQuestion + 1}/{questions.length}</div>
                      <div className="text-2xl font-bold">Score: {score}</div>
                    </div>
                    
                    <TimerCircle time={timeLeft} maxTime={gameMode === 'timed' ? 15 : 30} />
                  </div>

                  <ProgressBar current={currentQuestion + 1} max={questions.length} className="mb-8" />

                  <div className="bg-white/10 backdrop-blur-md rounded-2xl p-8 mb-8">
                    <div className="flex items-center justify-between mb-6">
                      <span className="bg-gradient-to-r from-yellow-400 to-orange-500 text-black px-3 py-1 rounded-full text-sm font-bold">{question.category.toUpperCase()}</span>
                      {streak > 0 && (
                        <div className="flex items-center text-orange-400">
                          <Star className="w-5 h-5 mr-1" />
                          <span className="font-bold">{streak} streak</span>
                        </div>
                      )}
                    </div>
                    
                    <h2 className="text-2xl md:text-3xl font-bold text-center mb-8 leading-relaxed">{question.question}</h2>
                  </div>

                  <div className="grid gap-4 mb-8">
                    {question.answers.map((answer, index) => {
                      let buttonClass = "w-full p-6 rounded-xl text-left transition-all duration-300 transform hover:scale-105";
                      if (selectedAnswer === null) {
                        buttonClass += " bg-white/10 hover:bg-white/20 border-2 border-transparent hover:border-white/30";
                      } else {
                        if (index === selectedAnswer) {
                          if (answer.score >= 12) buttonClass += " bg-green-500 border-2 border-green-300";
                          else if (answer.score >= 5) buttonClass += " bg-yellow-500 border-2 border-yellow-300";
                          else buttonClass += " bg-red-500 border-2 border-red-300";
                        } else {
                          buttonClass += " bg-gray-500/50 opacity-60";
                        }
                      }

                      return (
                        <button key={index} onClick={() => selectAnswer(index)} disabled={selectedAnswer !== null} className={buttonClass}>
                          <div className="flex items-center">
                            <span className="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center mr-4 text-sm font-bold">{String.fromCharCode(65 + index)}</span>
                            <span className="text-lg">{answer.text}</span>
                          </div>
                        </button>
                      );
                    })}
                  </div>

                  {/* Modal de feedback - remplace les anciens blocs showFeedback */}
                  <FeedbackModal
                    isOpen={showFeedbackModal}
                    onClose={closeFeedbackModal}
                    feedbackData={feedbackData}
                    question={question}
                    selectedAnswer={selectedAnswer}
                    timeOut={selectedAnswer === null && showFeedback}
                  />
                </div>
              </div>
            );
          }

          if (gameState === 'results') {
            const percentage = Math.round((score / (questions.length * 15)) * 100);
            return (
              <div className={`min-h-screen bg-gradient-to-br ${currentTheme.colors} text-white`}>
                <div className="container mx-auto px-4 py-8 max-w-4xl">
                  <div className="text-center">
                    <Trophy className="w-20 h-20 text-yellow-400 mx-auto mb-6" />
                    <h1 className="text-4xl md:text-5xl font-bold mb-4">Entretien Terminé !</h1>
                    <div className="bg-white/10 backdrop-blur-md rounded-2xl p-8 mb-8">
                      <div className="text-6xl font-bold text-yellow-400 mb-2">{score}</div>
                      <div className="text-xl text-gray-300 mb-4">Points obtenus</div>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
                        <div className="bg-white/10 rounded-lg p-4"><div className="text-2xl font-bold">{percentage}%</div><div className="text-sm text-gray-300">Réussite</div></div>
                        <div className="bg-white/10 rounded-lg p-4"><div className="text-2xl font-bold">{bestStreak}</div><div className="text-sm text-gray-300">Meilleur Streak</div></div>
                        <div className="bg-white/10 rounded-lg p-4"><div className="text-2xl font-bold">{questions.length}</div><div className="text-sm text-gray-300">Questions</div></div>
                        <div className="bg-white/10 rounded-lg p-4"><div className="text-2xl font-bold">{playerLevel}</div><div className="text-sm text-gray-300">Niveau</div></div>
                      </div>
                    </div>

                    <div className="bg-white/10 backdrop-blur-md rounded-xl p-6 mb-8 text-left">
                      <h3 className="text-xl font-bold mb-4 text-center">📊 Analyse de Performance</h3>
                      {percentage >= 80 ? (
                        <div className="bg-green-500/20 rounded-lg p-4 mb-4"><h4 className="font-bold text-green-300 mb-2">🎉 Excellent travail !</h4><p>Vous maîtrisez bien les techniques d'entretien. Continuez à pratiquer pour maintenir ce niveau.</p></div>
                      ) : percentage >= 60 ? (
                        <div className="bg-yellow-500/20 rounded-lg p-4 mb-4"><h4 className="font-bold text-yellow-300 mb-2">👍 Bon niveau</h4><p>Vous êtes sur la bonne voie. Concentrez-vous sur les questions qui vous posent le plus de difficultés.</p></div>
                      ) : (
                        <div className="bg-red-500/20 rounded-lg p-4 mb-4"><h4 className="font-bold text-red-300 mb-2">💪 À améliorer</h4><p>Ne vous découragez pas ! Pratiquez régulièrement en mode entraînement pour progresser.</p></div>
                      )}

                      <div className="grid md:grid-cols-2 gap-4 mt-4">
                        <div>
                          <h4 className="font-bold text-blue-300 mb-2">💡 Conseils d'amélioration :</h4>
                          <div className="mt-6 flex justify-center">
                            <button 
                              onClick={() => {
                                setShareCount(prev => prev + 1);
                                pushToast('Résultats partagés !');
                              }} 
                              className="bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 px-8 py-4 rounded-xl font-bold transition-all hover:scale-105 flex items-center justify-center"
                            >
                              Partager Score
                            </button>
                          </div>
                          <ul className="text-sm space-y-1">
                            <li>• Préparez vos réponses aux questions classiques</li>
                            <li>• Utilisez la méthode STAR pour les questions comportementales</li>
                            <li>• Entraînez-vous à répondre en 2-3 minutes maximum</li>
                            <li>• Renseignez-vous sur l'entreprise avant l'entretien</li>
                          </ul>
                        </div>
                        <div>
                          <h4 className="font-bold text-purple-300 mb-2">🎯 Prochaines étapes :</h4>
                          <ul className="text-sm space-y-1">
                            <li>• Rejouez en mode Survie pour tester vos limites</li>
                            <li>• Focalisez sur une catégorie spécifique</li>
                            <li>• Pratiquez les questions pièges</li>
                            <li>• Améliorez votre temps de réponse</li>
                          </ul>
                        </div>
                      </div>
                    </div>

                    <div className="flex flex-col md:flex-row gap-4 justify-center">
                      <button onClick={() => startGame(gameMode)} className="bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 px-8 py-4 rounded-xl font-bold transition-all hover:scale-105 flex items-center justify-center">
                        <RotateCcw className="w-5 h-5 mr-2" />Rejouer
                      </button>
                      
                      <button onClick={() => setGameState('menu')} className="bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 px-8 py-4 rounded-xl font-bold transition-all hover:scale-105 flex items-center justify-center">
                        <Home className="w-5 h-5 mr-2" />Menu Principal
                      </button>
                      
                      <button onClick={() => setGameState('profile')} className="bg-gradient-to-r from-purple-500 to-pink-600 hover:from-purple-600 hover:to-pink-700 px-8 py-4 rounded-xl font-bold transition-all hover:scale-105 flex items-center justify-center">
                        <Award className="w-5 h-5 mr-2" />Achievements
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          if (gameState === 'profile') {
            return (
              <div className={`min-h-screen bg-gradient-to-br ${currentTheme.colors} text-white`}>
                <div className="container mx-auto px-4 py-8 max-w-4xl">
                  <div className="flex items-center justify-between mb-8">
                    <button onClick={() => setGameState('menu')} className="bg-white/10 hover:bg-white/20 p-3 rounded-lg transition-all">
                      <Home className="w-6 h-6" />
                    </button>
                    <h1 className="text-3xl md:text-4xl font-bold">Profil Joueur</h1>
                    <div className="w-12"></div>
                  </div>

                  <div className="bg-white/10 backdrop-blur-md rounded-2xl p-8 mb-8">
                    <div className="flex flex-col md:flex-row items-center md:items-start gap-6">
                      <div className="text-center">
                        <div className="text-8xl mb-2">{playerAvatar.emoji}</div>
                        <button onClick={() => setShowSettings(!showSettings)} className="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg transition-all flex items-center">
                          <Settings className="w-4 h-4 mr-2" />Changer
                        </button>
                      </div>
                      
                      <div className="flex-1 text-center md:text-left">
                        <h2 className="text-3xl font-bold mb-4">Joueur Niveau {playerLevel}</h2>
                        <div className="mb-4">
                          <div className="flex justify-between text-sm mb-1">
                            <span>Expérience</span>
                            <span>{totalXP % 100}/100 XP</span>
                          </div>
                          <ProgressBar current={totalXP % 100} max={100} />
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                          <div className="bg-white/10 rounded-lg p-3"><div className="text-xl font-bold">{gamesPlayed}</div><div className="text-sm text-gray-300">Parties jouées</div></div>
                          <div className="bg-white/10 rounded-lg p-3"><div className="text-xl font-bold">{bestScore}</div><div className="text-sm text-gray-300">Meilleur score</div></div>
                          <div className="bg-white/10 rounded-lg p-3"><div className="text-xl font-bold">{bestStreak}</div><div className="text-sm text-gray-300">Meilleur streak</div></div>
                          <div className="bg-white/10 rounded-lg p-3"><div className="text-xl font-bold">{playerAchievements.filter(a => a.unlocked).length}</div><div className="text-sm text-gray-300">Achievements</div></div>
                        </div>
                      </div>
                    </div>
                  </div>

                  {showSettings && (
                    <div className="bg-white/10 backdrop-blur-md rounded-xl p-6 mb-8">
                      <h3 className="text-xl font-bold mb-4 text-center">Choisir un avatar</h3>
                      <div className="grid grid-cols-3 md:grid-cols-6 gap-4">
                        {avatars.map(avatar => (
                          <button key={avatar.id} onClick={() => { setPlayerAvatar(avatar); setShowSettings(false); }} className={`p-4 rounded-lg transition-all hover:scale-110 ${ playerAvatar.id === avatar.id ? 'bg-blue-500 scale-110' : 'bg-white/10 hover:bg-white/20' }`}>
                            <div className="text-4xl mb-2">{avatar.emoji}</div>
                            <div className="text-xs">{avatar.name}</div>
                          </button>
                        ))}
                      </div>

                      <div className="mt-6 border-t border-white/10 pt-4">
                        <h4 className="font-bold mb-2">Paramètres de l'application</h4>
                        <div className="flex items-center justify-between">
                          <div className="text-sm text-gray-300">Réinitialiser la progression (supprime achievements, stats et révisions)</div>
                          <button onClick={() => setShowResetModal(true)} className="bg-red-600 hover:bg-red-700 px-3 py-2 rounded-lg">Réinitialiser</button>
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="bg-white/10 backdrop-blur-md rounded-xl p-6">
                    <h3 className="text-xl font-bold mb-6 text-center">🏆 Achievements</h3>
                    <div className="grid md:grid-cols-2 gap-4">
                      {playerAchievements.map(achievement => (
                        <div key={achievement.id} className={`p-4 rounded-lg border-2 transition-all ${ achievement.unlocked ? 'bg-yellow-500/20 border-yellow-400 text-yellow-100' : 'bg-gray-500/20 border-gray-600 text-gray-400' }`}>
                          <div className="flex items-center">
                            <span className="text-3xl mr-4">{achievement.icon}</span>
                            <div>
                              <h4 className="font-bold">{achievement.name}</h4>
                              <p className="text-sm">{achievement.description}</p>
                              {achievement.unlocked && <span className="text-xs bg-yellow-400 text-black px-2 py-1 rounded-full mt-1 inline-block">Débloqué !</span>}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          // Global UI: toasts and reset confirmation modal
          return (
            <>
              {/* Toasts */}
              <div className="fixed bottom-6 right-6 flex flex-col items-end space-y-3 z-50">
                {toasts.map(t => (
                  <div key={t.id} className="bg-black/80 text-white px-4 py-2 rounded-lg shadow-lg max-w-xs">
                    {t.text}
                  </div>
                ))}
              </div>

              {/* Reset confirmation modal */}
              {showResetModal && (
                <div className="fixed inset-0 bg-black/60 z-40 flex items-center justify-center">
                  <div className="bg-white text-black rounded-lg p-6 w-full max-w-md">
                    <h3 className="text-xl font-bold mb-4">Confirmer la réinitialisation</h3>
                    <p className="mb-4">Êtes-vous sûr de vouloir supprimer toute votre progression ? Cette action est irréversible.</p>
                    <div className="flex justify-end gap-3">
                      <button onClick={() => setShowResetModal(false)} className="px-4 py-2 rounded-lg bg-gray-200">Annuler</button>
                      <button onClick={resetProgress} className="px-4 py-2 rounded-lg bg-red-600 text-white">Réinitialiser</button>
                    </div>
                  </div>
                </div>
              )}
            </>
          );
        };

        /***** Montage de l'app *****/
        const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(InterviewMaster));

    </script>
</body>
</html>
